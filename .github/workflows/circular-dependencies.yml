name: Circular dependencies

on:
  pull_request:
    branches: [main]

jobs:
  madge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Analyze circular dependencies (madge)
        id: analyze
        run: |
          set +e
          npx madge --circular --extensions ts --ts-config tsconfig.json src > madge-report.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_ENV"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('madge-report.txt')
              ? fs.readFileSync('madge-report.txt', 'utf8').trimEnd()
              : '(no report file)';
            const exitCode = parseInt(process.env.exit_code || '0', 10);
            const marker = '<!-- madge-circular-deps -->';
            const status =
              exitCode === 0
                ? '**Result:** No circular dependencies.'
                : '**Result:** Circular dependencies detected (madge exited non‑zero).';
            const body = [
              marker,
              '## Circular dependency check (`madge`)',
              '',
              status,
              '',
              '```',
              report,
              '```',
              '',
              '_Workflow: `.github/workflows/circular-dependencies.yml`_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((c) =>
              (c.body || '').includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail when circular dependencies exist
        if: env.exit_code != '0'
        run: |
          echo "::error::Circular dependencies reported by madge — see PR comment for details."
          exit 1
